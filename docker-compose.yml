services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - alice_data:/app/data
    environment:
      NODE_ENV: production
      JWT_SECRET: "change-this-secret"
      ADMIN_PASSWORD: "admin123"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      LINKEDIN_ACCESS_TOKEN: ""
      LINKEDIN_PERSON_URN: ""

volumes:
  alice_data:
