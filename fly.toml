app = "alice-in-prodland"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[mounts]]
  source = "alice_data"
  destination = "/app/data"
  initial_size = "1gb"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
